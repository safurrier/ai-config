repos:
-   repo: local
    hooks:
    -   id: lint
        name: Run Linter
        entry: env -u VIRTUAL_ENV uv run --python .venv/bin/python ruff check src/
        language: system
        always_run: true
        pass_filenames: false
    -   id: format
        name: Run Formatter
        entry: env -u VIRTUAL_ENV uv run --python .venv/bin/python ruff format --check src/
        language: system
        always_run: true
        pass_filenames: false
    -   id: ty
        name: Run Type Checker
        entry: env -u VIRTUAL_ENV uv run --python .venv/bin/python ty check src/
        language: system
        always_run: true
        pass_filenames: false
    -   id: test
        name: Run Tests
        entry: env -u VIRTUAL_ENV uv run --python .venv/bin/python pytest tests/ -q -m "not docker"
        language: system
        always_run: true
        pass_filenames: false
